<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta id="meta-desc" name="description" content="">
    <title id="doc-title">Loading…</title>
    <link id="canonical-link" rel="canonical" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased min-h-screen">
    <div id="app">
        <div class="flex min-h-screen items-center justify-center px-4 text-zinc-500">Loading content…</div>
    </div>

    <script>
(function () {
    /** Same-repo file (works on GitHub Pages). After you push, you can point this at Statically for CDN delivery, e.g.:
     *  'https://cdn.statically.io/gh/bass-p/bass-p.github.io/main/content.json'
     */
    var CONTENT_URL = 'content.json';

    function escapeHtml(text) {
        if (text == null) return '';
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function certCard(c) {
        var inner = (
            '<div class="w-16 h-16 rounded-lg bg-teal-500/20 flex items-center justify-center mb-4">' +
                '<svg class="w-8 h-8 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">' +
                    '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 00-4.438 0 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 013.138-3.138z"/>' +
                '</svg>' +
            '</div>' +
            '<h3 class="font-semibold text-white">' + escapeHtml(c.name) + '</h3>' +
            '<p class="text-sm text-teal-400">' + escapeHtml(c.issuer) + '</p>' +
            '<p class="font-mono text-xs text-zinc-500 mt-2">' + escapeHtml(c.date) + '</p>'
        );
        var wrap = c.url
            ? '<a href="' + escapeHtml(c.url) + '" target="_blank" rel="noopener noreferrer" class="block p-6 rounded-xl bg-zinc-800/30 border border-zinc-700/50 hover:border-teal-500/50 transition-all duration-300 hover:-translate-y-1">' + inner + '</a>'
            : '<div class="block p-6 rounded-xl bg-zinc-800/30 border border-zinc-700/50">' + inner + '</div>';
        return wrap;
    }

    function hireChips(items, className) {
        return items.map(function (h) {
            return '<a href="#' + escapeHtml(h.anchor) + '" class="' + className + '">' + escapeHtml(h.label) + '</a>';
        }).join('');
    }

    function render(data) {
        var s = data.site;
        var p = data.person;
        document.getElementById('doc-title').textContent = s.title;
        document.getElementById('meta-desc').setAttribute('content', s.description);
        var canon = document.getElementById('canonical-link');
        canon.setAttribute('href', s.primaryUrl || '');

        var chipMd = 'text-xs font-mono px-2 py-1 rounded bg-zinc-800 hover:bg-teal-600/30 text-teal-400 hover:text-teal-300 transition-colors';
        var chipLg = 'px-4 py-2 rounded-lg bg-zinc-800/80 hover:bg-teal-600/30 border border-zinc-700 hover:border-teal-500/50 text-teal-400 font-medium transition-all duration-300 hover:-translate-y-0.5';

        var rolesGrid = data.roles.map(function (r) {
            return (
                '<a href="#' + escapeHtml(r.anchor) + '" class="group p-6 rounded-xl bg-zinc-800/50 border border-zinc-700/50 hover:border-teal-500/50 transition-all duration-300 hover:-translate-y-1 text-left">' +
                    '<div class="w-12 h-12 rounded-lg bg-teal-500/20 flex items-center justify-center mb-4 group-hover:bg-teal-500/30 transition-colors">' +
                        '<svg class="w-6 h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">' +
                            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>' +
                        '</svg>' +
                    '</div>' +
                    '<h3 class="font-semibold text-white mb-2">' + escapeHtml(r.title) + '</h3>' +
                    '<p class="text-sm text-zinc-400">' + escapeHtml(r.summary) + '</p>' +
                '</a>'
            );
        }).join('');

        var experienceHtml = data.experienceSections.map(function (sec) {
            var jobs = sec.jobs.map(function (job) {
                var meta = '';
                if (job.company) {
                    meta += '<p class="text-teal-400 font-medium">' + escapeHtml(job.company) + '</p>';
                }
                if (job.dates) {
                    meta += '<p class="font-mono text-sm text-zinc-500 mt-1">' + escapeHtml(job.dates) + '</p>';
                }
                var tags = (job.tags || []).map(function (t) {
                    return '<span class="px-2 py-1 text-xs font-mono rounded bg-zinc-700/50 text-zinc-400">' + escapeHtml(t) + '</span>';
                }).join('');
                return (
                    '<article class="p-6 rounded-xl bg-zinc-800/30 border border-zinc-700/50 hover:border-zinc-600 transition-colors">' +
                        '<div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">' +
                            '<div>' +
                                '<h3 class="text-xl font-semibold text-white">' + escapeHtml(job.role) + '</h3>' +
                                meta +
                            '</div>' +
                        '</div>' +
                        '<p class="mt-4 text-zinc-400 leading-relaxed">' + escapeHtml(job.description) + '</p>' +
                        (tags ? '<div class="mt-4 flex flex-wrap gap-2">' + tags + '</div>' : '') +
                    '</article>'
                );
            }).join('');
            return (
                '<div id="' + escapeHtml(sec.id) + '" class="scroll-mt-28 space-y-8">' +
                    '<h3 class="text-xl font-semibold text-teal-400 border-b border-zinc-700 pb-2">' + escapeHtml(sec.heading) + '</h3>' +
                    jobs +
                '</div>'
            );
        }).join('');

        var certs = data.certifications.map(certCard).join('');

        var contactLinks = data.contact.links.map(function (l) {
            var isPrimary = l.variant === 'primary';
            var cls = isPrimary
                ? 'inline-flex items-center gap-2 px-6 py-3 rounded-lg bg-teal-600 hover:bg-teal-500 text-white font-medium transition-colors'
                : 'inline-flex items-center gap-2 px-6 py-3 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white font-medium transition-colors border border-zinc-700';
            var hrefLower = (l.href || '').toLowerCase();
            var icon;
            if (isPrimary) {
                icon = '<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>';
            } else if (hrefLower.indexOf('github.com') !== -1) {
                icon = '<svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>';
            } else if (hrefLower.indexOf('linkedin.com') !== -1) {
                icon = '<svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 23.999 1.771 23.999h20.451C23.2 24 23.999 23.227 23.999 22.271V1.729C23.999 .774 23.2 0 22.222 0h.003z"/></svg>';
            } else {
                icon = '<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>';
            }
            return '<a href="' + escapeHtml(l.href) + '" class="' + cls + '"' + (l.href.indexOf('mailto:') !== 0 && l.href.indexOf('#') !== 0 ? ' target="_blank" rel="noopener noreferrer"' : '') + '>' + icon + escapeHtml(l.label) + '</a>';
        }).join('');

        document.getElementById('app').innerHTML =
            '<nav class="sticky top-0 z-50 bg-zinc-950/90 backdrop-blur-md border-b border-zinc-800">' +
                '<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">' +
                    '<div class="flex items-center justify-between h-16">' +
                        '<a href="#" class="font-semibold text-teal-400 hover:text-teal-300 transition-colors">' + escapeHtml(p.name) + '</a>' +
                        '<div class="hidden md:flex items-center gap-8">' +
                            '<a href="#about" class="text-sm font-medium text-zinc-300 hover:text-white transition-colors">About</a>' +
                            '<a href="#experience" class="text-sm font-medium text-zinc-300 hover:text-white transition-colors">Experience</a>' +
                            '<a href="#certifications" class="text-sm font-medium text-zinc-300 hover:text-white transition-colors">Certifications</a>' +
                            '<a href="#contact" class="text-sm font-medium text-zinc-300 hover:text-white transition-colors">Contact</a>' +
                            '<div class="flex items-center gap-2 pl-4 border-l border-zinc-700">' +
                                '<span class="text-xs font-mono text-zinc-500 uppercase tracking-wider">Hire for:</span>' +
                                hireChips(data.hireFor, chipMd) +
                            '</div>' +
                        '</div>' +
                        '<button type="button" id="mobile-menu-btn" class="md:hidden p-2 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-800" aria-label="Open menu">' +
                            '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>' +
                        '</button>' +
                    '</div>' +
                '</div>' +
                '<div id="mobile-menu" class="hidden md:hidden border-t border-zinc-800">' +
                    '<div class="px-4 py-4 space-y-2">' +
                        '<a href="#about" class="block py-2 text-zinc-300 hover:text-white">About</a>' +
                        '<a href="#experience" class="block py-2 text-zinc-300 hover:text-white">Experience</a>' +
                        '<a href="#certifications" class="block py-2 text-zinc-300 hover:text-white">Certifications</a>' +
                        '<a href="#contact" class="block py-2 text-zinc-300 hover:text-white">Contact</a>' +
                        '<div class="pt-4 border-t border-zinc-800">' +
                            '<span class="text-xs font-mono text-zinc-500 uppercase tracking-wider">Hire me for:</span>' +
                            '<div class="flex flex-wrap gap-2 mt-2">' +
                                hireChips(data.hireFor, 'text-xs font-mono px-2 py-1 rounded bg-zinc-800 text-teal-400') +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</nav>' +
            '<main>' +
                '<section id="about" class="min-h-screen flex items-center justify-center px-4 py-24">' +
                    '<div class="max-w-4xl mx-auto text-center">' +
                        '<img src="' + escapeHtml(p.profileImage) + '" alt="' + escapeHtml(p.name) + '" width="128" height="128" class="w-32 h-32 rounded-full mx-auto mb-8 object-cover border-2 border-teal-500/50 shadow-lg shadow-teal-900/20" loading="eager" decoding="async">' +
                        '<h1 class="text-5xl md:text-6xl font-bold text-white mb-4">' + escapeHtml(p.name) + '</h1>' +
                        '<p class="text-xl text-teal-400 font-medium mb-2">' + escapeHtml(p.headline) + '</p>' +
                        '<p class="text-lg text-zinc-400 max-w-2xl mx-auto mb-8">' + escapeHtml(p.tagline) + '</p>' +
                        '<p class="text-zinc-400 leading-relaxed mb-12 max-w-2xl mx-auto">' + escapeHtml(p.about) + '</p>' +
                        '<div class="flex flex-wrap justify-center gap-3 mb-12 items-center">' +
                            '<span class="font-mono text-xs text-zinc-500 uppercase">Hire me for:</span>' +
                            hireChips(data.hireFor, chipLg) +
                        '</div>' +
                    '</div>' +
                '</section>' +
                '<section class="py-24 px-4 bg-zinc-900/50">' +
                    '<div class="max-w-7xl mx-auto">' +
                        '<h2 class="text-2xl md:text-3xl font-bold text-center mb-12">Roles &amp; Expertise</h2>' +
                        '<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">' + rolesGrid + '</div>' +
                    '</div>' +
                '</section>' +
                '<section id="experience" class="py-24 px-4">' +
                    '<div class="max-w-4xl mx-auto">' +
                        '<h2 class="text-3xl font-bold mb-12">Experience</h2>' +
                        '<div class="space-y-16">' + experienceHtml + '</div>' +
                    '</div>' +
                '</section>' +
                '<section id="certifications" class="py-24 px-4 bg-zinc-900/50">' +
                    '<div class="max-w-7xl mx-auto">' +
                        '<h2 class="text-3xl font-bold mb-12">Certifications</h2>' +
                        '<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">' + certs + '</div>' +
                    '</div>' +
                '</section>' +
                '<section id="contact" class="py-24 px-4">' +
                    '<div class="max-w-2xl mx-auto text-center">' +
                        '<h2 class="text-3xl font-bold mb-12">' + escapeHtml(data.contact.heading) + '</h2>' +
                        '<p class="text-zinc-400 mb-8">' + escapeHtml(data.contact.intro) + '</p>' +
                        '<div class="flex flex-wrap justify-center gap-6">' + contactLinks + '</div>' +
                    '</div>' +
                '</section>' +
                '<footer class="border-t border-zinc-800 py-8 text-center text-sm text-zinc-600">' +
                    '<p>© <span id="y"></span> ' + escapeHtml(p.name) + ' · <a href="' + escapeHtml(s.primaryUrl) + '" class="text-zinc-500 hover:text-teal-400 transition-colors">basantpaudel.digital</a></p>' +
                '</footer>' +
            '</main>';

        document.getElementById('y').textContent = String(new Date().getFullYear());

        document.getElementById('mobile-menu-btn').addEventListener('click', function () {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
        document.querySelectorAll('#mobile-menu a').forEach(function (link) {
            link.addEventListener('click', function () {
                document.getElementById('mobile-menu').classList.add('hidden');
            });
        });
        document.querySelectorAll('a[href^="#experience-"]').forEach(function (link) {
            link.addEventListener('click', function (e) {
                var id = this.getAttribute('href').slice(1);
                var target = document.getElementById(id);
                if (target) {
                    e.preventDefault();
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    }

    fetch(CONTENT_URL)
        .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(render)
        .catch(function () {
            document.getElementById('app').innerHTML =
                '<div class="flex min-h-screen flex-col items-center justify-center gap-4 px-4 text-center">' +
                '<p class="text-zinc-300">Could not load <code class="text-teal-400">content.json</code>.</p>' +
                '<p class="text-sm text-zinc-500">Open this site via a local or hosted server, or check the file path / CORS settings if using a Statically URL.</p>' +
                '</div>';
        });
})();
    </script>
</body>
</html>
